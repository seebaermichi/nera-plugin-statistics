name: Test

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    test:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                # Node 18 is deliberately absent: the dev-only `cheerio`
                # dependency pulls in `undici`, which needs a global `File`
                # (Node 20+), as does the vitest 4 / vite 8 toolchain.
                # `engines` is >=20 to match.
                node-version: [20, 22]

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run linter
              run: npm run lint

            - name: Run tests
              run: npx vitest run
