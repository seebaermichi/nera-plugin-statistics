name: Test

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    test:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                # Node 18 is deliberately absent: the dev-only `cheerio`
                # dependency pulls in `undici`, which needs a global `File`
                # (Node 20+). `engines` stays >=18 because consumers never
                # install devDependencies.
                node-version: [20, 22]

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run linter
              run: npm run lint

            - name: Run tests
              run: npx vitest run
